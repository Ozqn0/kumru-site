<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menü - Kumru & Tost Haus</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <span class="orange">KUMRU & TOST</span><br>
      <span class="black">HAUS</span>
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Ana Sayfa</a></li>
      <li><a href="menu.html" class="active">Menü</a></li>
      <li><a href="contact.html">İletişim</a></li>
    </ul>

    <div class="search-icon">🔍</div>
  </nav>

  <section class="menu-page">
    <h1 class="menu-title">Menü</h1>

    <div class="category-grid">
      <a href="#kumrular" class="category-card">
        <div class="category-image placeholder-box">
          <img src="imagess/kkumru_resmi.jpg" alt="Kumrular">
        </div>
        <h3>Kumrular</h3>
      </a>

      <a href="#tostlar" class="category-card">
        <div class="category-image placeholder-box">
          <img src="imagess/atom-tost.jpg" alt="Tostlar">
        </div>
        <h3>Tostlar</h3>
      </a>

      <a href="#icecekler" class="category-card">
        <div class="category-image placeholder-box">
          <img src="imagess/içecek.jpg" alt="İçecek">
        </div>
        <h3>İçecekler</h3>
      </a>
    </div>

    <section id="kumrular" class="menu-section">
      <h2 class="section-heading">Kumrular</h2>
      <div id="grid-kumrular" class="product-grid">
        </div>
    </section>

    <section id="tostlar" class="menu-section">
      <h2 class="section-heading">Tostlar</h2>
      <div id="grid-tostlar" class="product-grid">
        </div>
    </section>

    <section id="icecekler" class="menu-section">
      <h2 class="section-heading">İçecekler</h2>
      <div id="grid-icecekler" class="product-grid">
        </div>
    </section>

  </section>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // JSON dosyasının yolu
      const dataUrl = "/data/menu.json";

      fetch(dataUrl)
        .then(response => {
          if (!response.ok) throw new Error("JSON dosyası bulunamadı.");
          return response.json();
        })
        .then(data => {
          // HTML'deki grid alanlarını eşleştiriyoruz
          const grids = {
            "Kumrular": document.getElementById("grid-kumrular"),
            "Tostlar": document.getElementById("grid-tostlar"),
            "İçecekler": document.getElementById("grid-icecekler")
          };

          // Gridlerin içini temizle (varsa eski statik veriler gitsin)
          Object.values(grids).forEach(grid => { if(grid) grid.innerHTML = ""; });

          // JSON içindeki "urunler" listesini dön
          if(data.urunler && Array.isArray(data.urunler)) {
            data.urunler.forEach(urun => {
              // Ürün kartı tasarımı (Senin orijinal tasarımınla aynı)
              const urunHtml = `
                <div class="product-card">
                  <div class="product-image" style="background-image: url('${urun.image}'); background-size: cover; background-position: center; min-height: 200px; display: flex; align-items: center; justify-content: center;">
                    ${urun.image ? '' : 'Görsel'}
                  </div>
                  <div class="product-info">
                    <h3>${urun.title}</h3>
                    <p>${urun.description || ''}</p>
                    <span class="product-price">₺${urun.price}</span>
                    <div class="product-actions">
                      <button class="detail-btn">İncele</button>
                      <button class="plus-btn">+</button>
                    </div>
                  </div>
                </div>
              `;

              // Ürünü doğru kategoriye yerleştir
              if (grids[urun.category]) {
                grids[urun.category].insertAdjacentHTML("beforeend", urunHtml);
              }
            });
          }
        })
        .catch(err => {
          console.error("Menü yüklenirken hata:", err);
          // Hata durumunda kullanıcıya bilgi verilebilir
        });
    });
  </script>

</body>
</html>
