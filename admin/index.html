<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>İçerik Yönetim Paneli</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* 1. TÜM CİHAZLAR İÇİN ANA DÜZENLEME */
      .nc-app-container {
        display: block !important;
      }

      /* 2. BİLGİSAYAR GÖRÜNÜMÜ (Ekran genişse) */
      @media (min-width: 1024px) {
        /* Sol ve sağ panelleri yan yana getir, boşluğu kapat */
        div[class^="SplitPane"], .SplitPane {
          display: flex !important;
          flex-direction: row !important;
          width: 100% !important;
        }
        div[class*="Pane1"] { width: 50% !important; }
        div[class*="Pane2"] { width: 50% !important; display: block !important; }
      }

      /* 3. MOBİL GÖRÜNÜM (Telefonlar) */
      @media (max-width: 1023px) {
        /* Sağ paneli (önizleme) tamamen yok et */
        div[class*="Pane2"], aside, [class*="PreviewPane"] {
          display: none !important;
          width: 0 !important;
          visibility: hidden !important;
        }
        /* Sol paneli (form) tam ekran yap */
        div[class*="Pane1"] {
          width: 100% !important;
          flex: 1 1 auto !important;
        }
        /* Resim seçme penceresini (dialog) telefon ekranına zorla sığdır */
        div[role="dialog"] {
          width: 96vw !important;
          left: 2vw !important;
          top: 2vh !important;
          height: 96vh !important;
        }
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // JavaScript ile önizlemeyi kapatma (Garanti olsun diye)
      CMS.registerPreviewTemplate("menu_sayfasi", () => null);
    </script>
  </body>
</html>
