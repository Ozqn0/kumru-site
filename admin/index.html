<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>İçerik Yönetim Paneli</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* BİLGİSAYAR: Her şey olduğu gibi kalsın */
      @media (min-width: 1025px) {
        div[class^="SplitPane"] { display: flex !important; }
      }

      /* MOBİL: Beyaz ekranı çözüp formu tam ekran yapan kısım */
      @media (max-width: 1024px) {
        /* Sağdaki önizleme panelini tamamen etkisiz hale getir */
        div[class*="Pane2"], 
        aside[class*="PreviewPane"] {
          display: none !important;
          width: 0 !important;
          height: 0 !important;
          overflow: hidden !important;
        }

        /* Soldaki form panelini zorla görünür ve tam ekran yap */
        div[class*="Pane1"] {
          display: block !important;
          width: 100% !important;
          opacity: 1 !important;
          visibility: visible !important;
          position: relative !important;
        }

        /* Ana taşıyıcıyı esnet */
        div[class^="SplitPane"] {
          display: block !important;
        }

        /* Resim seçme (Media Library) penceresi düzenlemesi */
        div[role="dialog"] {
          width: 98vw !important;
          left: 1vw !important;
          top: 1vh !important;
          height: 98vh !important;
        }
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Kategori ismine göre önizlemeyi kapat (config.yml'deki name ile aynı olmalı)
      CMS.registerPreviewTemplate("menu_sayfasi", () => null);
    </script>
  </body>
</html>
