backend:
  name: git-gateway
  branch: main # GitHub'daki ana dalın adı (master ise master yaz)

media_folder: "assets/images/menu" # Görsellerin yükleneceği klasör
public_folder: "/assets/images/menu"

collections:
  - name: "menu"
    label: "Menü Ürünleri"
    folder: "data/menu" # Ürünlerin .json veya .md olarak kaydedileceği yer
    create: true # Yeni ürün ekleme izni
    slug: "{{slug}}"
    fields:
      - { label: "Ürün Adı", name: "title", widget: "string" }
      - { label: "Kategori", name: "category", widget: "select", options: ["Kumrular", "Tostlar", "İçecekler"] }
      - { label: "Açıklama", name: "body", widget: "text" }
      - { label: "Fiyat", name: "price", widget: "string" }
      - { label: "Ürün Görseli", name: "image", widget: "image" }